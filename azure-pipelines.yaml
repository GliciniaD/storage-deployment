
resources:
  repositories:
    - repository: Azure-devops-tasks
      type: github
      name: GliciniaD/Azure-devops-tasks
      endpoint: 'github.com_GliciniaD'


trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: TerraformDeploy
    variables:
      ARM_USE_OIDC: 'true'
      ARM_USE_MSI: 'false'
      ARM_CLIENT_ID: '$(servicePrincipalId)'
      ARM_TENANT_ID: '$(tenantId)'
      ARM_SUBSCRIPTION_ID: '$(subscriptionId)'
    steps:
    - checkout: self
    - template: terraform-tasks.yaml@Azure-devops-tasks